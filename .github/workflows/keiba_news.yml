name: Keiba News YouTube Auto Post

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post-keiba-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest horse racing news
        run: python scripts/fetch_news.py

      - name: Check if news exists
        id: check_news
        run: |
          if python -c 'import json,sys; d=json.load(open("news.json")); sys.exit(0 if d else 1)' 2>/dev/null; then
            echo "has_news=true" >> "$GITHUB_OUTPUT"
            echo "新着ニュースあり"
          else
            echo "has_news=false" >> "$GITHUB_OUTPUT"
            echo "新着ニュースなし。後続ステップをスキップします。"
          fi

      - name: Generate narration script
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_script.py 2>&1 | tee /tmp/gemini.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Gemini失敗: $(tail -5 /tmp/gemini.log | tr '\n' ' ')"
            exit $STATUS
          fi

      - name: Generate audio
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_audio.py

      - name: 競馬画像をダウンロード
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          python - <<'EOF'
          import requests, os, random
          from pathlib import Path

          Path("assets").mkdir(exist_ok=True)

          headers = {"User-Agent": "Mozilla/5.0"}

          # Pixabay API（無料・APIキー不要で一部利用可能）
          keywords = ["horse racing", "jockey", "racecourse", "thoroughbred horse", "horse track"]

          downloaded = 0
          for i, keyword in enumerate(keywords):
              if downloaded >= 3:
                  break
              try:
                  # Pixabay APIで検索
                  api_url = f"https://pixabay.com/api/?q={keyword.replace(' ', '+')}&image_type=photo&per_page=5&safesearch=true"
                  r = requests.get(api_url, headers=headers, timeout=15)
                  data = r.json()

                  if data.get("hits"):
                      hit = data["hits"][0]
                      img_url = hit["largeImageURL"]
                      img_r = requests.get(img_url, headers=headers, timeout=30)
                      if img_r.status_code == 200 and len(img_r.content) > 10000:
                          path = f"assets/horse{i+1}.jpg"
                          with open(path, "wb") as f:
                              f.write(img_r.content)
                          print(f"✅ 成功: horse{i+1}.jpg ({keyword})")
                          downloaded += 1
              except Exception as e:
                  print(f"❌ エラー: {keyword} ({e})")

          # Pixabayが失敗した場合はPexels APIを試す
          if downloaded == 0:
              print("Pixabay失敗、Pexelsを試します")
              pexels_queries = ["horse racing", "jockey riding", "horse track"]
              for i, query in enumerate(pexels_queries):
                  try:
                      api_url = f"https://api.pexels.com/v1/search?query={query}&per_page=3&orientation=portrait"
                      r = requests.get(api_url, headers={
                          **headers,
                          "Authorization": "563492ad6f91700001000001b8e9c0a5b3f54b8b9e0a1f2c3d4e5f60"
                      }, timeout=15)
                      data = r.json()
                      if data.get("photos"):
                          img_url = data["photos"][0]["src"]["large2x"]
                          img_r = requests.get(img_url, headers=headers, timeout=30)
                          if img_r.status_code == 200 and len(img_r.content) > 10000:
                              path = f"assets/horse{i+1}.jpg"
                              with open(path, "wb") as f:
                                  f.write(img_r.content)
                              print(f"✅ Pexels成功: horse{i+1}.jpg ({query})")
                              downloaded += 1
                  except Exception as e:
                      print(f"❌ Pexelsエラー: {query} ({e})")

          print(f"最終的にダウンロードした画像数: {downloaded}")
          EOF

      - name: Generate video
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_video.py

      - name: Diagnose Drive credentials
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python - <<'EOF' 2>&1 | tee /tmp/drive_diag.log
          import os, sys, traceback
          print("=== Drive 認証診断 ===")
          cid = os.environ.get("GOOGLE_CLIENT_ID","")
          cs  = os.environ.get("GOOGLE_CLIENT_SECRET","")
          rt  = os.environ.get("GOOGLE_REFRESH_TOKEN","")
          print(f"CLIENT_ID set: {bool(cid)} (len={len(cid)})")
          print(f"CLIENT_SECRET set: {bool(cs)} (len={len(cs)})")
          print(f"REFRESH_TOKEN set: {bool(rt)} (len={len(rt)})")
          try:
              import google.auth.transport.requests
              from google.oauth2.credentials import Credentials
              creds = Credentials(
                  token=None,
                  refresh_token=rt,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=cid,
                  client_secret=cs,
                  scopes=["https://www.googleapis.com/auth/drive.file"],
              )
              req = google.auth.transport.requests.Request()
              creds.refresh(req)
              print("トークンリフレッシュ: 成功")
              print(f"access_token prefix: {creds.token[:20]}...")
          except Exception as e:
              print(f"トークンリフレッシュ: 失敗")
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Upload to Google Drive
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python scripts/upload_drive.py 2>&1 | tee /tmp/drive_upload.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "## Drive Upload Error" >> $GITHUB_STEP_SUMMARY
            cat /tmp/drive_upload.log >> $GITHUB_STEP_SUMMARY
            exit $STATUS
          fi

      - name: Upload Drive logs as artifact
        if: always() && steps.check_news.outputs.has_news == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drive-logs
          path: |
            /tmp/drive_diag.log
            /tmp/drive_upload.log
          if-no-files-found: ignore

      - name: Commit and push posted_ids.txt
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.txt
          if git diff --staged --quiet; then
            echo "posted_ids.txt に変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update posted_ids.txt [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
