name: Keiba News YouTube Auto Post

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post-keiba-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest horse racing news
        run: python scripts/fetch_news.py

      - name: Check if news exists
        id: check_news
        run: |
          if python -c 'import json,sys; d=json.load(open("news.json")); sys.exit(0 if d else 1)' 2>/dev/null; then
            echo "has_news=true" >> "$GITHUB_OUTPUT"
            echo "新着ニュースあり"
          else
            echo "has_news=false" >> "$GITHUB_OUTPUT"
            echo "新着ニュースなし。後続ステップをスキップします。"
          fi

      - name: Generate narration script
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_script.py 2>&1 | tee /tmp/gemini.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Gemini失敗: $(tail -5 /tmp/gemini.log | tr '\n' ' ')"
            exit $STATUS
          fi

      - name: Generate audio
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_audio.py

      - name: 競馬画像をダウンロード
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          python - <<'EOF'
          import requests
          from pathlib import Path

          Path("assets").mkdir(exist_ok=True)
          headers = {"User-Agent": "Mozilla/5.0 (compatible; Googlebot/2.1)"}

          images = [
              ("bg_real_1.jpg", "https://upload.wikimedia.org/wikipedia/commons/4/44/Racecourse.jpg"),
              ("bg_real_2.jpg", "https://upload.wikimedia.org/wikipedia/commons/9/9d/Horse_racing_2.jpg"),
              ("bg_real_3.jpg", "https://upload.wikimedia.org/wikipedia/commons/f/f0/Horse_Racing_in_Mumbai.jpg"),
              ("bg_real_4.jpg", "https://upload.wikimedia.org/wikipedia/commons/3/38/2006_Newmarket_July_Course.jpg"),
              ("bg_real_5.jpg", "https://upload.wikimedia.org/wikipedia/commons/6/6f/Horse_Racing_Cheltenham_Festival_2007.jpg"),
          ]

          success = 0
          for filename, url in images:
              path = f"assets/{filename}"
              if Path(path).exists():
                  print(f"⏭ スキップ（既存）: {filename}")
                  success += 1
                  continue
              try:
                  r = requests.get(url, timeout=20, headers=headers, allow_redirects=True)
                  print(f"  → status={r.status_code} size={len(r.content)}")
                  if r.status_code == 200 and len(r.content) > 5000:
                      with open(path, "wb") as f:
                          f.write(r.content)
                      print(f"✅ 成功: {filename}")
                      success += 1
                  else:
                      print(f"❌ 失敗: {filename}")
              except Exception as e:
                  print(f"❌ エラー: {filename} ({e})")

          print(f"ダウンロード成功: {success}/{len(images)}")
          print(f"assets内ファイル: {list(Path('assets').iterdir())}")
          EOF

      - name: Generate video
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_video.py

      - name: Diagnose Drive credentials
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python - <<'EOF' 2>&1 | tee /tmp/drive_diag.log
          import os, sys, traceback
          print("=== Drive 認証診断 ===")
          cid = os.environ.get("GOOGLE_CLIENT_ID","")
          cs  = os.environ.get("GOOGLE_CLIENT_SECRET","")
          rt  = os.environ.get("GOOGLE_REFRESH_TOKEN","")
          print(f"CLIENT_ID set: {bool(cid)} (len={len(cid)})")
          print(f"CLIENT_SECRET set: {bool(cs)} (len={len(cs)})")
          print(f"REFRESH_TOKEN set: {bool(rt)} (len={len(rt)})")
          try:
              import google.auth.transport.requests
              from google.oauth2.credentials import Credentials
              creds = Credentials(
                  token=None,
                  refresh_token=rt,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=cid,
                  client_secret=cs,
                  scopes=["https://www.googleapis.com/auth/drive.file"],
              )
              req = google.auth.transport.requests.Request()
              creds.refresh(req)
              print("トークンリフレッシュ: 成功")
              print(f"access_token prefix: {creds.token[:20]}...")
          except Exception as e:
              print(f"トークンリフレッシュ: 失敗")
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Upload to Google Drive
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python scripts/upload_drive.py 2>&1 | tee /tmp/drive_upload.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "## Drive Upload Error" >> $GITHUB_STEP_SUMMARY
            cat /tmp/drive_upload.log >> $GITHUB_STEP_SUMMARY
            exit $STATUS
          fi

      - name: Upload Drive logs as artifact
        if: always() && steps.check_news.outputs.has_news == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: drive-logs
          path: |
            /tmp/drive_diag.log
            /tmp/drive_upload.log
          if-no-files-found: ignore

      - name: Commit and push posted_ids.txt
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.txt
          if git diff --staged --quiet; then
            echo "posted_ids.txt に変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update posted_ids.txt [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
