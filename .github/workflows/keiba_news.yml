name: Keiba News YouTube Auto Post

on:
  schedule:
    # 8:00〜20:00 JST を2時間おきに7回実行（JST = UTC+9）
    - cron: "0 23 * * *"  #  8:00 JST
    - cron: "0 1 * * *"   # 10:00 JST
    - cron: "0 3 * * *"   # 12:00 JST
    - cron: "0 5 * * *"   # 14:00 JST
    - cron: "0 7 * * *"   # 16:00 JST
    - cron: "0 9 * * *"   # 18:00 JST
    - cron: "0 11 * * *"  # 20:00 JST
  workflow_dispatch:

jobs:
  post-keiba-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest horse racing news
        env:
          GNEWS_API_KEY: ${{ secrets.GNEWS_API_KEY }}
        run: python scripts/fetch_news.py 2>&1 | tee /tmp/fetch_news.log; exit ${PIPESTATUS[0]}

      - name: Post fetch_news debug log to Issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          log_path = "/tmp/fetch_news.log"
          try:
              with open(log_path) as f:
                  lines = f.readlines()
          except Exception:
              lines = ["(ログなし)"]
          # DEBUG行・要注目行だけ抽出（全行は長すぎる）
          keep = [l for l in lines if any(k in l for k in ["[GNews]","[RSS#","[DEBUG]","[警告]","取得:","フィルタ","件を選択","エントリー","競馬関連","投稿済み","[Netkeiba]","canonical","スクレイプ"])]
          log = "".join(keep[:120])
          if not log.strip():
              log = "".join(lines[:60])
          title = "[DEBUG] fetch_news ログ " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Debug Issue作成: {data.get('html_url')}")
          PYEOF

      - name: Check if news exists
        id: check_news
        run: |
          if python -c 'import json,sys; d=json.load(open("news.json")); sys.exit(0 if d else 1)' 2>/dev/null; then
            echo "has_news=true" >> "$GITHUB_OUTPUT"
            echo "新着ニュースあり"
          else
            echo "has_news=false" >> "$GITHUB_OUTPUT"
            echo "新着ニュースなし。後続ステップをスキップします。"
          fi

      - name: Generate narration script
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: |
          python scripts/generate_script.py 2>&1 | tee /tmp/gemini.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Gemini失敗: $(tail -5 /tmp/gemini.log | tr '\n' ' ')"
            exit $STATUS
          fi

      - name: AI画像を生成
        id: ai_images
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_TOKEN_2: ${{ secrets.HF_TOKEN_2 }}
          HF_TOKEN_3: ${{ secrets.HF_TOKEN_3 }}
        run: |
          python -u scripts/generate_images.py 2>&1 | tee "$GITHUB_WORKSPACE/ai_images_log.txt"
          exit ${PIPESTATUS[0]}

      - name: AI画像ログをIssueに投稿（失敗時のみ）
        if: failure() && steps.ai_images.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          log_path = os.environ.get("GITHUB_WORKSPACE", "") + "/ai_images_log.txt"
          try:
              with open(log_path) as f:
                  log = "".join(f.readlines()[:80])
          except Exception:
              log = "(ログなし)"
          title = "[DEBUG] AI画像生成ログ " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Issue作成: {data.get('html_url')}")
          PYEOF

      - name: Check if scripts exist
        id: check_scripts
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          if ls output/script_*.txt 2>/dev/null | grep -q .; then
            echo "has_scripts=true" >> "$GITHUB_OUTPUT"
            echo "脚本ファイルあり"
          else
            echo "has_scripts=false" >> "$GITHUB_OUTPUT"
            echo "脚本ファイルなし（全記事スキップ）。後続ステップをスキップします。"
          fi

      - name: Generate audio
        if: steps.check_scripts.outputs.has_scripts == 'true'
        run: python scripts/generate_audio.py

      - name: BGMをダウンロード (CC0 public domain only)
        if: steps.check_scripts.outputs.has_scripts == 'true'
        continue-on-error: true
        run: |
          mkdir -p assets/bgm
          python scripts/download_bgm.py

      - name: フォントをダウンロード (太ゴシック・デザイン系)
        if: steps.check_scripts.outputs.has_scripts == 'true'
        continue-on-error: true
        run: |
          mkdir -p assets/fonts
          python scripts/download_fonts.py

      - name: Generate video
        if: steps.check_scripts.outputs.has_scripts == 'true'
        run: python scripts/generate_video.py

      # YouTube Data API でアップロード（後続ステップで Playwright によるサムネイル設定）
      - name: Upload to YouTube
        if: steps.check_scripts.outputs.has_scripts == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID_2: ${{ secrets.GOOGLE_CLIENT_ID2 }}
          GOOGLE_CLIENT_SECRET_2: ${{ secrets.GOOGLE_CLIENT_SECRET2 }}
          GOOGLE_REFRESH_TOKEN_2: ${{ secrets.GOOGLE_REFRESH_TOKEN_2 }}
          GOOGLE_CLIENT_ID_3: ${{ secrets.GOOGLE_CLIENT_ID3 }}
          GOOGLE_CLIENT_SECRET_3: ${{ secrets.GOOGLE_CLIENT_SECRET3 }}
          GOOGLE_REFRESH_TOKEN_3: ${{ secrets.GOOGLE_REFRESH_TOKEN3 }}
        run: python scripts/upload_youtube.py

      # サムネイル設定: Studio 内部 API（Playwright 不要・クッキー不要）を優先し、
      # 失敗した場合は Playwright フォールバックを試みる。
      - name: Set thumbnails via YouTube Studio API
        id: thumbnail_api
        if: steps.check_scripts.outputs.has_scripts == 'true'
        continue-on-error: true
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID_2: ${{ secrets.GOOGLE_CLIENT_ID2 }}
          GOOGLE_CLIENT_SECRET_2: ${{ secrets.GOOGLE_CLIENT_SECRET2 }}
          GOOGLE_REFRESH_TOKEN_2: ${{ secrets.GOOGLE_REFRESH_TOKEN_2 }}
          GOOGLE_CLIENT_ID_3: ${{ secrets.GOOGLE_CLIENT_ID3 }}
          GOOGLE_CLIENT_SECRET_3: ${{ secrets.GOOGLE_CLIENT_SECRET3 }}
          GOOGLE_REFRESH_TOKEN_3: ${{ secrets.GOOGLE_REFRESH_TOKEN3 }}
        run: python scripts/set_thumbnail_studio_api.py 2>&1 | tee /tmp/thumbnail_studio_api.log; exit ${PIPESTATUS[0]}

      # Studio 内部 API が失敗した場合の Playwright フォールバック。
      # YOUTUBE_COOKIES（ブラウザからエクスポートした Cookie JSON）が必要。
      - name: Set thumbnails via YouTube Studio (Playwright fallback)
        id: thumbnail_playwright
        if: steps.check_scripts.outputs.has_scripts == 'true' && steps.thumbnail_api.outcome == 'failure'
        continue-on-error: true
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: |
          playwright install chromium --with-deps
          python scripts/set_thumbnail_playwright.py 2>&1 | tee /tmp/thumbnail_playwright.log; exit ${PIPESTATUS[0]}

      - name: Commit and push posted_ids.txt
        if: always() && steps.check_news.outputs.has_news == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.txt last_upload_result.txt output/thumbnail_*.jpg 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update posted_ids.txt [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Save logs to repo
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p debug
          cp /tmp/fetch_news.log debug/last_fetch_news.log 2>/dev/null || echo "(ログなし)" > debug/last_fetch_news.log
          cp /tmp/gemini.log debug/last_generate_script.log 2>/dev/null || echo "(ログなし)" > debug/last_generate_script.log
          cp /tmp/thumbnail_studio_api.log debug/last_thumbnail_studio_api.log 2>/dev/null || echo "(ログなし)" > debug/last_thumbnail_studio_api.log
          cp /tmp/thumbnail_playwright.log debug/last_thumbnail_playwright.log 2>/dev/null || echo "(ログなし)" > debug/last_thumbnail_playwright.log
          # APIキーパターンをログからマスク（key=AIzaSy... 形式）
          for f in debug/last_fetch_news.log debug/last_generate_script.log debug/last_thumbnail_studio_api.log debug/last_thumbnail_playwright.log; do
            sed -i 's/key=AIzaSy[A-Za-z0-9_-]*/key=***/g' "$f" 2>/dev/null || true
          done
          git add debug/last_fetch_news.log debug/last_generate_script.log debug/last_thumbnail_studio_api.log debug/last_thumbnail_playwright.log
          if git diff --staged --quiet; then
            echo "ログ変更なし。"
          else
            git commit -m "chore: save fetch_news log [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
