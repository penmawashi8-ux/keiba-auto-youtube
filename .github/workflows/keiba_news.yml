name: Keiba News YouTube Auto Post

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post-keiba-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest horse racing news
        run: python scripts/fetch_news.py

      - name: Check if news exists
        id: check_news
        run: |
          if python -c 'import json,sys; d=json.load(open("news.json")); sys.exit(0 if d else 1)' 2>/dev/null; then
            echo "has_news=true" >> "$GITHUB_OUTPUT"
            echo "新着ニュースあり"
          else
            echo "has_news=false" >> "$GITHUB_OUTPUT"
            echo "新着ニュースなし。後続ステップをスキップします。"
          fi

      - name: Generate narration script
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_script.py 2>&1 | tee /tmp/gemini.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Gemini失敗: $(tail -5 /tmp/gemini.log | tr '\n' ' ')"
            exit $STATUS
          fi

      - name: AI画像を生成
        id: ai_images
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -u scripts/generate_images.py 2>&1 | tee "$GITHUB_WORKSPACE/ai_images_log.txt"
          exit ${PIPESTATUS[0]}

      - name: AI画像ログをIssueに投稿（失敗時のみ）
        if: failure() && steps.ai_images.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          log_path = os.environ.get("GITHUB_WORKSPACE", "") + "/ai_images_log.txt"
          try:
              with open(log_path) as f:
                  log = "".join(f.readlines()[:80])
          except Exception:
              log = "(ログなし)"
          title = "[DEBUG] AI画像生成ログ " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Issue作成: {data.get('html_url')}")
          PYEOF

      - name: Generate audio
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_audio.py

      - name: Generate video
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_video.py

      - name: Diagnose Drive credentials
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: |
          python - <<'EOF' 2>&1 | tee /tmp/drive_diag.log
          import os, sys, traceback
          print("=== Drive 認証診断 ===")
          cid = os.environ.get("GOOGLE_CLIENT_ID","")
          cs  = os.environ.get("GOOGLE_CLIENT_SECRET","")
          rt  = os.environ.get("GOOGLE_REFRESH_TOKEN","")
          print(f"CLIENT_ID set: {bool(cid)} (len={len(cid)})")
          print(f"CLIENT_SECRET set: {bool(cs)} (len={len(cs)})")
          print(f"REFRESH_TOKEN set: {bool(rt)} (len={len(rt)})")
          try:
              import google.auth.transport.requests
              from google.oauth2.credentials import Credentials
              creds = Credentials(
                  token=None,
                  refresh_token=rt,
                  token_uri="https://oauth2.googleapis.com/token",
                  client_id=cid,
                  client_secret=cs,
                  scopes=["https://www.googleapis.com/auth/drive.file"],
              )
              req = google.auth.transport.requests.Request()
              creds.refresh(req)
              print("トークンリフレッシュ: 成功")
              print(f"access_token prefix: {creds.token[:20]}...")
          except Exception as e:
              print(f"トークンリフレッシュ: 失敗")
              traceback.print_exc()
              sys.exit(1)
          EOF

      - name: Upload to YouTube
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          echo "=== output/ の動画ファイル ==="
          ls -lh output/video_*.mp4 2>/dev/null || echo "(なし)"
          echo "=== news.json 件数 ==="
          python3 -c "import json; d=json.load(open('news.json')); print(len(d),'件')" 2>/dev/null || echo "(読み込み失敗)"
          python scripts/upload_youtube.py 2>&1 | tee /tmp/youtube_upload.log
          STATUS=${PIPESTATUS[0]}
          # 常にログをIssueに投稿して内容を確認できるようにする
          python3 - <<'PYEOF'
          import os, json, urllib.request
          log_path = "/tmp/youtube_upload.log"
          try:
              with open(log_path) as f:
                  log = f.read()[:3000]
          except Exception:
              log = "(ログなし)"
          import datetime
          title = "[DEBUG] YouTube Upload Log " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Issue作成: {data.get('html_url')}")
          PYEOF
          if [ $STATUS -ne 0 ]; then
            exit $STATUS
          fi
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Upload YouTube logs as artifact
        if: always() && steps.check_news.outputs.has_news == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: youtube-logs
          path: |
            /tmp/drive_diag.log
            /tmp/youtube_upload.log
          if-no-files-found: ignore

      - name: Commit and push posted_ids.txt
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.txt
          if git diff --staged --quiet; then
            echo "posted_ids.txt に変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update posted_ids.txt [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
