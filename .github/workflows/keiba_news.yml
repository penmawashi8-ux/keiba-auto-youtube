name: Keiba News YouTube Auto Post

on:
  schedule:
    # 毎日 09:00 JST (= 00:00 UTC)
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  post-keiba-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest horse racing news
        run: python scripts/fetch_news.py

      - name: Check if news exists
        id: check_news
        run: |
          if python -c 'import json,sys; d=json.load(open("news.json")); sys.exit(0 if d else 1)' 2>/dev/null; then
            echo "has_news=true" >> "$GITHUB_OUTPUT"
            echo "新着ニュースあり"
          else
            echo "has_news=false" >> "$GITHUB_OUTPUT"
            echo "新着ニュースなし。後続ステップをスキップします。"
          fi

      - name: Generate narration script
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/generate_script.py 2>&1 | tee /tmp/gemini.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Gemini失敗: $(tail -5 /tmp/gemini.log | tr '\n' ' ')"
            exit $STATUS
          fi

      - name: AI画像を生成
        id: ai_images
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -u scripts/generate_images.py 2>&1 | tee "$GITHUB_WORKSPACE/ai_images_log.txt"
          exit ${PIPESTATUS[0]}

      - name: AI画像ログをIssueに投稿（失敗時のみ）
        if: failure() && steps.ai_images.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          log_path = os.environ.get("GITHUB_WORKSPACE", "") + "/ai_images_log.txt"
          try:
              with open(log_path) as f:
                  log = "".join(f.readlines()[:80])
          except Exception:
              log = "(ログなし)"
          title = "[DEBUG] AI画像生成ログ " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Issue作成: {data.get('html_url')}")
          PYEOF

      - name: Generate audio
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_audio.py

      - name: Generate video
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_video.py

      - name: Install Playwright browser
        if: steps.check_news.outputs.has_news == 'true'
        run: playwright install chromium --with-deps

      - name: Upload to YouTube (Playwright)
        id: playwright_upload
        if: steps.check_news.outputs.has_news == 'true'
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
        run: python scripts/upload_youtube_playwright.py 2>&1 | tee /tmp/playwright.log; exit ${PIPESTATUS[0]}

      - name: Post Playwright log to Issue (失敗時)
        if: failure() && steps.playwright_upload.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          try:
              log = open("/tmp/playwright.log").read()[-3000:]
          except Exception:
              log = "(ログなし)"
          title = "[DEBUG] Playwright upload log " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          req = urllib.request.Request(
              f"https://api.github.com/repos/{os.environ['GH_REPO']}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {os.environ['GH_TOKEN']}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as r:
              print(json.loads(r.read()).get("html_url"))
          PYEOF

      - name: Commit and push posted_ids.txt
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.txt
          if git diff --staged --quiet; then
            echo "posted_ids.txt に変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update posted_ids.txt [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
