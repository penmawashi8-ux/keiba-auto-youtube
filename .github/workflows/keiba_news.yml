name: Keiba News YouTube Auto Post

on:
  schedule:
    # 8:00〜20:00 JST を2時間おきに7回実行（JST = UTC+9）
    - cron: "0 23 * * *"  #  8:00 JST
    - cron: "0 1 * * *"   # 10:00 JST
    - cron: "0 3 * * *"   # 12:00 JST
    - cron: "0 5 * * *"   # 14:00 JST
    - cron: "0 7 * * *"   # 16:00 JST
    - cron: "0 9 * * *"   # 18:00 JST
    - cron: "0 11 * * *"  # 20:00 JST
  workflow_dispatch:

jobs:
  post-keiba-news:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Fetch latest horse racing news
        run: python scripts/fetch_news.py

      - name: Check if news exists
        id: check_news
        run: |
          if python -c 'import json,sys; d=json.load(open("news.json")); sys.exit(0 if d else 1)' 2>/dev/null; then
            echo "has_news=true" >> "$GITHUB_OUTPUT"
            echo "新着ニュースあり"
          else
            echo "has_news=false" >> "$GITHUB_OUTPUT"
            echo "新着ニュースなし。後続ステップをスキップします。"
          fi

      - name: Generate narration script
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: |
          python scripts/generate_script.py 2>&1 | tee /tmp/gemini.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::Gemini失敗: $(tail -5 /tmp/gemini.log | tr '\n' ' ')"
            exit $STATUS
          fi

      - name: AI画像を生成
        id: ai_images
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python -u scripts/generate_images.py 2>&1 | tee "$GITHUB_WORKSPACE/ai_images_log.txt"
          exit ${PIPESTATUS[0]}

      - name: AI画像ログをIssueに投稿（失敗時のみ）
        if: failure() && steps.ai_images.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          log_path = os.environ.get("GITHUB_WORKSPACE", "") + "/ai_images_log.txt"
          try:
              with open(log_path) as f:
                  log = "".join(f.readlines()[:80])
          except Exception:
              log = "(ログなし)"
          title = "[DEBUG] AI画像生成ログ " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "```\n" + log + "\n```"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Issue作成: {data.get('html_url')}")
          PYEOF

      - name: Generate audio
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_audio.py

      - name: Generate BGM (フリーBGM3種生成)
        if: steps.check_news.outputs.has_news == 'true'
        run: |
          mkdir -p assets/bgm
          # BGM1: 明るいアップテンポ（Cメジャー コード プラック 2Hz）
          if [ ! -f assets/bgm/bgm_1.mp3 ]; then
            ffmpeg -y -f lavfi \
              -i "aevalsrc='0.35*sin(523.3*2*PI*t)*exp(-4*fmod(t,0.5))+0.25*sin(659.3*2*PI*t)*exp(-4*fmod(t,0.5))+0.2*sin(783.99*2*PI*t)*exp(-4*fmod(t,0.5))+0.15*sin(1046.5*2*PI*t)*exp(-4*fmod(t,0.5)):c=stereo:s=44100:d=90'" \
              -af "afade=t=in:st=0:d=3,afade=t=out:st=87:d=3,volume=0.9" \
              assets/bgm/bgm_1.mp3
            echo "BGM1 生成完了（明るいアップテンポ）"
          fi
          # BGM2: 落ち着いたアンビエント（Gメジャー コード スロー）
          if [ ! -f assets/bgm/bgm_2.mp3 ]; then
            ffmpeg -y -f lavfi \
              -i "aevalsrc='0.3*sin(392*2*PI*t)*(0.6+0.4*sin(0.4*2*PI*t))+0.25*sin(493.88*2*PI*t)*(0.6+0.4*sin(0.4*2*PI*t+1.0))+0.2*sin(587.33*2*PI*t)*(0.6+0.4*sin(0.4*2*PI*t+2.0))+0.15*sin(196*2*PI*t)*(0.6+0.4*sin(0.4*2*PI*t)):c=stereo:s=44100:d=90'" \
              -af "afade=t=in:st=0:d=4,afade=t=out:st=86:d=4,volume=0.8" \
              assets/bgm/bgm_2.mp3
            echo "BGM2 生成完了（落ち着いたアンビエント）"
          fi
          # BGM3: 疾走感のある競馬らしいBGM（Aマイナー 速いプラック）
          if [ ! -f assets/bgm/bgm_3.mp3 ]; then
            ffmpeg -y -f lavfi \
              -i "aevalsrc='0.3*sin(220*2*PI*t)*exp(-6*fmod(t,0.25))+0.25*sin(330*2*PI*t)*exp(-6*fmod(t,0.25))+0.2*sin(440*2*PI*t)*exp(-6*fmod(t,0.25))+0.25*sin(110*2*PI*t)*exp(-6*fmod(t,0.25)):c=stereo:s=44100:d=90'" \
              -af "afade=t=in:st=0:d=2,afade=t=out:st=88:d=2,volume=0.9" \
              assets/bgm/bgm_3.mp3
            echo "BGM3 生成完了（疾走感のある競馬BGM）"
          fi

      - name: Generate video
        if: steps.check_news.outputs.has_news == 'true'
        run: python scripts/generate_video.py

      - name: Upload to Drive (テスト)
        if: steps.check_news.outputs.has_news == 'true'
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
        run: python scripts/upload_drive.py

      # - name: Upload to YouTube
      #   if: steps.check_news.outputs.has_news == 'true'
      #   env:
      #     GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      #     GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      #     GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
      #     GOOGLE_CLIENT_ID_2: ${{ secrets.GOOGLE_CLIENT_ID2 }}
      #     GOOGLE_CLIENT_SECRET_2: ${{ secrets.GOOGLE_CLIENT_SECRET2 }}
      #     GOOGLE_REFRESH_TOKEN_2: ${{ secrets.GOOGLE_REFRESH_TOKEN_2 }}
      #     GOOGLE_CLIENT_ID_3: ${{ secrets.GOOGLE_CLIENT_ID3 }}
      #     GOOGLE_CLIENT_SECRET_3: ${{ secrets.GOOGLE_CLIENT_SECRET3 }}
      #     GOOGLE_REFRESH_TOKEN_3: ${{ secrets.GOOGLE_REFRESH_TOKEN3 }}
      #   run: python scripts/upload_youtube.py

      - name: Commit and push posted_ids.txt
        if: always() && steps.check_news.outputs.has_news == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_ids.txt last_upload_result.txt output/thumbnail_*.jpg 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: update posted_ids.txt [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
