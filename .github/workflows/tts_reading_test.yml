name: TTS読み上げテスト

# data/tts_reading_test.txt を音声合成し、読み変換の検証結果をログに、
# 生成音声をアーティファクトに出力する。手動実行のほか、読み辞書や
# 置換ロジックが変更されたときにも回帰テストとして自動実行される。
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - data/tts_reading_test.txt
      - data/jockeys.json
      - data/trainers.json
      - data/readings.json
      - scripts/reading_utils.py
      - .github/workflows/tts_reading_test.yml

jobs:
  tts-reading-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write  # tts-test-output ブランチへの push 用
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-noto-cjk

      - name: Install Python dependencies
        run: pip install edge-tts

      - name: テスト原稿を配置
        run: |
          mkdir -p output
          cp data/tts_reading_test.txt output/script_0.txt

      - name: 読み変換の検証
        run: |
          python - <<'PYEOF'
          import sys
          sys.path.insert(0, "scripts")
          from reading_utils import apply_readings

          src = open("output/script_0.txt", encoding="utf-8").read()
          converted = apply_readings(src)
          print("=== 変換後（TTSに渡るテキスト） ===")
          print(converted)

          # 変換されるべき読み
          expected = [
              "たけゆたか騎手", "さめしまかつま騎手", "よこやまたけし騎手",
              "すがわらあきら騎手", "みゆきひであき騎手", "もりかずま騎手",
              "さかいりゅうせい騎手", "いわたみらい騎手",
              "さめしまかつまが鋭く",   # 鮫島駿
              "よこやまたけしが粘って", # 横山武
              "よこやまのりひろは二着", # 横山典
              "いわたみらいが三着",     # 岩田望
              "さかいりゅうせいは四着", # 坂井瑠
              "すがわらあきらは五着",   # 菅原明
              "とざきが先頭",           # 姓のみ
              "さめしまが続き",
              "いがらしとむとうも",
              "かわだは出遅れ",
              "たけ騎手が戦列に復帰",   # 1文字姓+騎手
              "みゆき騎手は重賞を制覇",
              "もり騎手とはやし騎手、はら騎手",
              "たけさんの記録",
              "やはぎよしと調教師",       # 調教師フルネーム
              "ともみちやすお調教師",
              "なかうちだ厩舎",           # 姓+厩舎
              "ほり厩舎",                 # 1文字姓+厩舎
              "やはぎ師",                 # 姓+師
              "たけこうしろう師",         # フルネーム+師
              "いけえ師",                 # 姓+師（池江）
              "すみいかつひこ調教師",
              "ふじさわかずお調教師",
              "よこやまたけし騎手とたけゆたか騎手",
              "むとうみやび騎手とたけ騎手",
              "あんじょうたけゆたかでしんば戦",
              "りっとうはんろで好時計",
          ]
          # 変換されてはいけない語（誤爆チェック）
          forbidden_conversions = [
              "武器", "武蔵", "幸せ", "森の中", "原っぱ", "石川県", "松山競馬場",
          ]
          ng = 0
          for s in expected:
              if s not in converted:
                  print(f"[NG] 変換されていない: {s}")
                  ng += 1
          for s in forbidden_conversions:
              if s not in converted:
                  print(f"[NG] 誤って置換された: {s}")
                  ng += 1
          if ng:
              print(f"{ng} 件の読み変換エラー")
              sys.exit(1)
          print(f"読み変換チェック OK（期待 {len(expected)} 件 + 保護 {len(forbidden_conversions)} 件）")
          PYEOF

      - name: Generate audio
        env:
          TTS_VOICE: ja-JP-KeitaNeural
          TTS_RATE: "+10%"
        run: python scripts/generate_audio.py

      # 生成音声をWhisperで文字起こしし、実際の発音を耳の代わりに確認する。
      # 認識結果は揺れる（同音の別漢字になる等）ため参考情報としてログに出す。
      - name: Whisperで発音を確認
        run: |
          pip install -q faster-whisper
          python - <<'PYEOF'
          from faster_whisper import WhisperModel

          model = WhisperModel("small", device="cpu", compute_type="int8")
          segments, _ = model.transcribe("output/audio_0.mp3", language="ja")
          lines = []
          print("=== Whisper文字起こし（発音の確認用） ===")
          for seg in segments:
              line = f"[{seg.start:6.1f}s] {seg.text}"
              print(line, flush=True)
              lines.append(line)
          with open("output/transcript.txt", "w", encoding="utf-8") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

      - name: Upload audio artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts-reading-test
          path: |
            output/audio_0.mp3
            output/subtitles_0.ass
            output/transcript.txt
          retention-days: 7

      # アーティファクトをブラウザ外から取得できるよう、専用ブランチにも保存する
      # （毎回force pushするので履歴は増えない）
      - name: 音声を tts-test-output ブランチに保存
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch --orphan tts-test-output
          git add -f output/audio_0.mp3 output/subtitles_0.ass output/transcript.txt
          git commit -m "TTS読み上げテスト出力 (run ${GITHUB_RUN_ID}) [skip ci]"
          git push -f origin tts-test-output
