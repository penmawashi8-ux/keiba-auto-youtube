name: Test Popular News Feasibility

on:
  workflow_dispatch:

jobs:
  test-popular-news:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install requests

      - name: Run popular news feasibility test
        run: python scripts/test_popular_news.py

      - name: Run fetch_popular_news.py (dry run - writes news.json only)
        run: |
          python scripts/fetch_popular_news.py
          echo "===== news.json ====="
          python -c "
          import json
          items = json.load(open('news.json'))
          print(f'{len(items)}件')
          for it in items:
              print('-', it.get('view_count', 0), 'views |', it['title'][:60])
              print('  url:', it['url'])
              print('  img:', it['image_url'][:80])
              print('  date:', it['published_date'][:19])
              print('  summary:', it['summary'][:150])
          "
