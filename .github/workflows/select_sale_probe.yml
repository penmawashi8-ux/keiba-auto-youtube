name: Select Sale Source Probe (debug)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/daily-top-video-autopost-g0r6el
    paths:
      - ".github/workflows/select_sale_probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Dump JRHA www4 official result lists
        run: |
          pip -q install requests beautifulsoup4
          python3 - <<'PYEOF'
          import requests
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
                "Accept-Language": "ja,en-US;q=0.9"}

          for path in ("2026_list1.html", "2026_list2.html", "2026_list.html"):
              url = f"https://www4.jrha.or.jp/jpn/{path}"
              try:
                  r = requests.get(url, headers=UA, timeout=25)
              except Exception as e:
                  print(f"\n#### {url} ERROR: {e}")
                  continue
              r.encoding = r.apparent_encoding
              print(f"\n#### {url} -> HTTP {r.status_code}, {len(r.text)} chars")
              if r.status_code != 200:
                  continue
              soup = BeautifulSoup(r.text, "html.parser")
              title = soup.find("title")
              print("TITLE:", title.get_text(strip=True) if title else "?")
              for ti, tbl in enumerate(soup.find_all("table")):
                  rows = tbl.find_all("tr")
                  print(f"--- table[{ti}] rows={len(rows)} ---")
                  for row in rows[:12]:
                      print(" | ".join(c.get_text(" ", strip=True)[:22] for c in row.find_all(["td", "th"])))
                  if ti >= 2:
                      print("  (以降のテーブルは省略)")
                      break
          PYEOF
