name: Select Sale Source Probe (debug)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/daily-top-video-autopost-g0r6el
    paths:
      - ".github/workflows/select_sale_probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Dump page structures
        run: |
          pip -q install requests beautifulsoup4
          python3 - <<'PYEOF'
          import requests
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
                "Accept-Language": "ja,en-US;q=0.9"}

          def get(url):
              r = requests.get(url, headers=UA, timeout=30)
              r.encoding = r.apparent_encoding
              print(f"\n########## {url} -> HTTP {r.status_code}, {len(r.text)} chars ##########")
              return r.text

          def dump_tables(html, max_rows=45):
              soup = BeautifulSoup(html, "html.parser")
              for ti, t in enumerate(soup.find_all("table")):
                  rows = t.find_all("tr")
                  print(f"--- table[{ti}] rows={len(rows)} ---")
                  for r in rows[:max_rows]:
                      cells = [c.get_text(" ", strip=True)[:25] for c in r.find_all(["td", "th"])]
                      print(" | ".join(cells))

          # JRHA SP版 結果一覧
          html = get("https://www.jrha.or.jp/sp/selectsale/result_list")
          dump_tables(html, max_rows=20)

          # JRHA 上場馬個別ページ（110 = 最高額のはず）
          html = get("https://www.jrha.or.jp/select/2026/110.html")
          soup = BeautifulSoup(html, "html.parser")
          lines = [l.strip() for l in soup.get_text("\n").splitlines() if l.strip()]
          print("\n".join(lines[:80]))
          dump_tables(html, max_rows=25)

          # netkeiba まとめ
          html = get("https://dir.netkeiba.com/keibamatome/detail.html?no=5754")
          dump_tables(html, max_rows=30)
          PYEOF
