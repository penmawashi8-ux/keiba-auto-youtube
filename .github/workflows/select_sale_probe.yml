name: Select Sale Source Probe (debug)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/daily-top-video-autopost-g0r6el
    paths:
      - ".github/workflows/select_sale_probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Dump result_detail structures
        run: |
          pip -q install requests beautifulsoup4
          python3 - <<'PYEOF'
          import re
          import requests
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
                "Accept-Language": "ja,en-US;q=0.9"}

          def get(url):
              r = requests.get(url, headers=UA, timeout=30)
              r.encoding = r.apparent_encoding
              print(f"\n########## {url} -> HTTP {r.status_code}, {len(r.text)} chars ##########")
              return r.text

          def dump(html, max_rows=15):
              soup = BeautifulSoup(html, "html.parser")
              # 見出しをすべて表示（どの年・どのセッションのページか判定用）
              for h in soup.find_all(["h1", "h2", "h3", "h4"]):
                  t = h.get_text(" ", strip=True)
                  if t:
                      print(f"[{h.name}] {t[:60]}")
              for ti, t in enumerate(soup.find_all("table")):
                  rows = t.find_all("tr")
                  print(f"--- table[{ti}] rows={len(rows)} ---")
                  for r in rows[:max_rows]:
                      cells = [c.get_text(" ", strip=True)[:24] for c in r.find_all(["td", "th"])]
                      print(" | ".join(cells))

          # 昨日確認した result_detail 系リンクの実体を確認
          for path in ["/sp/selectsale/result_detail/1/9/1",
                       "/sp/selectsale/result_detail/0/9/1",
                       "/sp/selectsale/result_detail/1/9/2"]:
              try:
                  dump(get("https://www.jrha.or.jp" + path))
              except Exception as e:
                  print(f"ERROR {path}: {e}")

          # デスクトップ版セール結果ページの全result系リンクと見出し
          html = get("https://www.jrha.or.jp/selectsale/result")
          soup = BeautifulSoup(html, "html.parser")
          for h in soup.find_all(["h1", "h2", "h3", "h4"]):
              t = h.get_text(" ", strip=True)
              if t:
                  print(f"[{h.name}] {t[:60]}")
          seen = set()
          for a in soup.find_all("a", href=True):
              href = a["href"]
              if ("result" in href or "select" in href) and href not in seen:
                  seen.add(href)
                  print(f"LINK {href}  TEXT={a.get_text(' ', strip=True)[:40]}")
          PYEOF
