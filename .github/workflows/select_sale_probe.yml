name: Select Sale Source Probe (debug)

on:
  workflow_dispatch:
  push:
    branches:
      - claude/daily-top-video-autopost-g0r6el
    paths:
      - ".github/workflows/select_sale_probe.yml"

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Identify 2026 result source
        run: |
          pip -q install requests beautifulsoup4
          python3 - <<'PYEOF'
          import requests
          from bs4 import BeautifulSoup

          UA = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36",
                "Accept-Language": "ja,en-US;q=0.9"}

          def get(url):
              r = requests.get(url, headers=UA, timeout=30)
              r.encoding = r.apparent_encoding
              print(f"\n### {url} -> HTTP {r.status_code}, {len(r.text)} chars, "
                    f"の2025:{r.text.count('の2025')} の2024:{r.text.count('の2024')} の2026:{r.text.count('の2026')}")
              return r.text

          # JRHA: セールIDの当たりを探す（9=2025?, 10=2026?）
          for sid in (9, 10, 11):
              for sess in (0, 1):
                  try:
                      html = get(f"https://www.jrha.or.jp/sp/selectsale/result_detail/{sess}/{sid}/7")
                      soup = BeautifulSoup(html, "html.parser")
                      tables = soup.find_all("table")
                      # 価格順の先頭数テーブルだけ表示
                      for t in tables[2:5]:
                          cells = [c.get_text(" ", strip=True)[:22] for c in t.find_all(["td", "th"])]
                          print("  " + " | ".join(cells[:14]))
                  except Exception as e:
                      print(f"ERROR {sess}/{sid}: {e}")

          # RBN 結果速報
          try:
              html = get("https://racing-book.net/other/news/12406")
              soup = BeautifulSoup(html, "html.parser")
              for ti, t in enumerate(soup.find_all("table")[:3]):
                  print(f"--- RBN table[{ti}] ---")
                  for r in t.find_all("tr")[:12]:
                      cells = [c.get_text(" ", strip=True)[:22] for c in r.find_all(["td", "th"])]
                      print(" | ".join(cells))
          except Exception as e:
              print(f"ERROR RBN: {e}")

          # netkeiba まとめ: テーブル以外の構造を確認
          try:
              html = get("https://dir.netkeiba.com/keibamatome/detail.html?no=5754")
              soup = BeautifulSoup(html, "html.parser")
              hits = soup.find_all(string=lambda s: s and "の2025" in s)
              print(f"netkeiba の2025 テキストノード: {len(hits)}")
              for h in hits[:8]:
                  parent = h.parent
                  print(f"  <{parent.name} class={parent.get('class')}> {h.strip()[:60]}")
          except Exception as e:
              print(f"ERROR netkeiba: {e}")
          PYEOF
