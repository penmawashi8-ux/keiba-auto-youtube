name: 週間重賞予想動画 生成・投稿

on:
  schedule:
    # 木曜 15:00 JST = 06:00 UTC（主要G1：木曜14時枠番確定）
    - cron: '0 6 * * 4'
    # 金曜 10:30 JST = 01:30 UTC（一般重賞：金曜9時枠番確定）
    - cron: '30 1 * * 5'
  workflow_dispatch:
    inputs:
      race_name:
        description: 'レース名（例: 天皇賞（春））'
        required: false
        default: ''
      race_date:
        description: 'レース日（例: 5月3日（日））'
        required: false
        default: ''
      race_venue:
        description: '会場（例: 京都）'
        required: false
        default: ''
      race_distance:
        description: '距離（例: 芝3200m）'
        required: false
        default: ''
      race_grade:
        description: 'グレード（例: G1）'
        required: false
        default: ''

jobs:
  weekly-prediction:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg fonts-noto-cjk libfontconfig1
          echo "ffmpeg: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: 週末の重賞情報を取得
        id: fetch_race
        env:
          RACE_NAME:        ${{ github.event.inputs.race_name }}
          RACE_DATE:        ${{ github.event.inputs.race_date }}
          RACE_VENUE:       ${{ github.event.inputs.race_venue }}
          RACE_DISTANCE:    ${{ github.event.inputs.race_distance }}
          RACE_GRADE:       ${{ github.event.inputs.race_grade }}
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/fetch_weekly_race.py

      - name: 予想脚本を生成
        env:
          GEMINI_API_KEY:   ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python scripts/generate_weekly_prediction.py

      - name: 音声を生成
        run: python scripts/generate_audio.py

      - name: BGMをダウンロード
        continue-on-error: true
        run: |
          mkdir -p assets/bgm
          python scripts/download_bgm.py

      - name: 横向き動画を生成
        id: gen_video
        timeout-minutes: 30
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          HF_TOKEN:        ${{ secrets.HF_TOKEN }}
          HF_TOKEN_2:      ${{ secrets.HF_TOKEN_2 }}
          HF_TOKEN_3:      ${{ secrets.HF_TOKEN_3 }}
        run: python scripts/landscape_video.py

      - name: 動画生成ログをIssueに投稿（失敗時のみ）
        if: failure() && steps.gen_video.conclusion == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO:  ${{ github.repository }}
        run: |
          python3 - <<'PYEOF'
          import os, json, urllib.request, datetime
          title = "[DEBUG] 週間重賞予想 動画生成失敗 " + datetime.datetime.utcnow().strftime("%Y-%m-%dT%H:%M")
          body = "週間重賞予想ワークフローの動画生成ステップが失敗しました。ログを確認してください。"
          payload = json.dumps({"title": title, "body": body}).encode()
          repo  = os.environ["GH_REPO"]
          token = os.environ["GH_TOKEN"]
          req = urllib.request.Request(
              f"https://api.github.com/repos/{repo}/issues",
              data=payload,
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="POST",
          )
          with urllib.request.urlopen(req) as resp:
              data = json.loads(resp.read())
              print(f"Issue作成: {data.get('html_url')}")
          PYEOF

      - name: YouTubeに投稿（横向き）
        env:
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID_2:   ${{ secrets.GOOGLE_CLIENT_ID2 }}
          GOOGLE_CLIENT_SECRET_2: ${{ secrets.GOOGLE_CLIENT_SECRET2 }}
          GOOGLE_REFRESH_TOKEN_2: ${{ secrets.GOOGLE_REFRESH_TOKEN_2 }}
          GOOGLE_CLIENT_ID_3:   ${{ secrets.GOOGLE_CLIENT_ID3 }}
          GOOGLE_CLIENT_SECRET_3: ${{ secrets.GOOGLE_CLIENT_SECRET3 }}
          GOOGLE_REFRESH_TOKEN_3: ${{ secrets.GOOGLE_REFRESH_TOKEN3 }}
        run: python scripts/upload_landscape_youtube.py

      - name: Commit and push
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_upload_result.txt posted_landscape_ids.txt 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "変更なし。スキップします。"
          else
            git commit -m "chore: 週間重賞予想動画 投稿完了 [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
