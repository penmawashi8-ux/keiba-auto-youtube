name: Famous Horse Series - 名馬列伝

on:
  workflow_dispatch:
    inputs:
      horse_key:
        description: "馬名を選択"
        required: true
        default: "silport"
        type: choice
        options:
          - linecrafter
          - silport
          - teiem_purikyua
      dry_run:
        description: "テストモード（YouTubeにアップせずArtifactのみ）"
        required: false
        default: false
        type: boolean

jobs:
  post-famous-horse:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1
          echo "ffmpeg version: $(ffmpeg -version 2>&1 | head -1)"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Validate horse key
        run: |
          KEY="${{ inputs.horse_key }}"
          if [ ! -f "data/famous_horses/${KEY}.json" ]; then
            echo "::error::馬名キー '${KEY}' が見つかりません"
            echo "利用可能なキー一覧:"
            ls data/famous_horses/*.json | xargs -I{} basename {} .json | sort
            exit 1
          fi
          echo "✓ 馬名キー '${KEY}' を確認しました"
          cat "data/famous_horses/${KEY}.json"

      # 脚本を output/script_0.txt に、タイトルを news.json に書き出す
      - name: Prepare horse script
        run: |
          mkdir -p output
          python scripts/famous_horse_prepare.py "${{ inputs.horse_key }}"

      # 追加背景画像を Pixabay から取得（失敗しても続行）
      - name: 背景画像取得 (Pixabay)
        continue-on-error: true
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.parse, pathlib, time
          api_key = os.environ.get("PIXABAY_API_KEY", "")
          if not api_key:
              print("PIXABAY_API_KEY 未設定。スキップします。")
              exit(0)
          pathlib.Path("assets").mkdir(exist_ok=True)
          queries = ["horse racing", "thoroughbred racehorse", "racetrack grandstand"]
          downloaded = 0
          for i, q in enumerate(queries):
              params = urllib.parse.urlencode({
                  "key": api_key, "q": q,
                  "image_type": "photo", "orientation": "vertical",
                  "min_width": 800, "per_page": 3,
              })
              try:
                  req = urllib.request.Request(
                      f"https://pixabay.com/api/?{params}",
                      headers={"User-Agent": "Mozilla/5.0"},
                  )
                  with urllib.request.urlopen(req, timeout=20) as resp:
                      hits = json.loads(resp.read()).get("hits", [])
                  for j, hit in enumerate(hits[:2]):
                      img_url = hit.get("largeImageURL") or hit.get("webformatURL")
                      if not img_url:
                          continue
                      dest = f"assets/ai_{i*2+j}.jpg"
                      img_req = urllib.request.Request(img_url, headers={"User-Agent": "Mozilla/5.0"})
                      with urllib.request.urlopen(img_req, timeout=30) as r:
                          pathlib.Path(dest).write_bytes(r.read())
                      print(f"  ダウンロード完了: {dest}")
                      downloaded += 1
              except Exception as e:
                  print(f"  [警告] クエリ'{q}'失敗: {e}")
              time.sleep(1)
          print(f"背景画像 {downloaded} 枚取得完了")
          PYEOF

      # 馬本人の画像を Wikimedia Commons から取得して ai_0.jpg に上書き
      # Pixabayの後に実行することでサムネイル用画像（ai_0）を確実に上書きする
      - name: 背景画像取得 (Wikimedia Commons)
        continue-on-error: true
        run: |
          python scripts/download_famous_horse_image.py "${{ inputs.horse_key }}" \
            2>&1 | tee /tmp/famous_horse_wikimedia.log
          PYEOF

      # TTS_VOICE=ja-JP-NanamiNeural で名馬シリーズ専用ボイスに切り替え
      - name: Generate audio (既存スクリプト流用・別ボイス)
        env:
          TTS_VOICE: "ja-JP-NanamiNeural"
          TTS_RATE:  "-3%"
        run: |
          python scripts/generate_audio.py 2>&1 | tee /tmp/famous_horse_audio.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::音声生成失敗"
            exit $STATUS
          fi

      - name: Download BGM (CC0 public domain only)
        continue-on-error: true
        run: |
          mkdir -p assets/bgm
          python scripts/download_famous_horse_bgm.py

      - name: Generate video
        env:
          FAMOUS_HORSE_UPLOAD: "1"
        run: |
          python scripts/generate_video.py 2>&1 | tee /tmp/famous_horse_video.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::動画生成失敗"
            exit $STATUS
          fi
          ls -lh output/video_*.mp4 2>/dev/null || true

      # 名馬シリーズ専用のタイトル・タグでアップロード
      - name: Upload video as artifact (確認用)
        uses: actions/upload-artifact@v4
        with:
          name: famous-horse-video-${{ inputs.horse_key }}
          path: output/video_0.mp4
          retention-days: 7

      - name: Upload to YouTube (名馬列伝タイトルで)
        if: ${{ !inputs.dry_run }}
        env:
          # 名馬列伝専用チャンネル（設定済みの場合に優先使用）
          FAMOUS_HORSE_CLIENT_ID:     ${{ secrets.FAMOUS_HORSE_CLIENT_ID }}
          FAMOUS_HORSE_CLIENT_SECRET: ${{ secrets.FAMOUS_HORSE_CLIENT_SECRET }}
          FAMOUS_HORSE_REFRESH_TOKEN: ${{ secrets.FAMOUS_HORSE_REFRESH_TOKEN }}
          # フォールバック: ニュース系チャンネル
          GOOGLE_CLIENT_ID:     ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_CLIENT_ID_2:     ${{ secrets.GOOGLE_CLIENT_ID2 }}
          GOOGLE_CLIENT_SECRET_2: ${{ secrets.GOOGLE_CLIENT_SECRET2 }}
          GOOGLE_REFRESH_TOKEN_2: ${{ secrets.GOOGLE_REFRESH_TOKEN_2 }}
          GOOGLE_CLIENT_ID_3:     ${{ secrets.GOOGLE_CLIENT_ID3 }}
          GOOGLE_CLIENT_SECRET_3: ${{ secrets.GOOGLE_CLIENT_SECRET3 }}
          GOOGLE_REFRESH_TOKEN_3: ${{ secrets.GOOGLE_REFRESH_TOKEN3 }}
          FAMOUS_HORSE_KEY:   ${{ inputs.horse_key }}
          FAMOUS_HORSE_UPLOAD: "1"
        run: |
          python scripts/famous_horse_upload.py "${{ inputs.horse_key }}" \
            2>&1 | tee /tmp/famous_horse_upload.log
          STATUS=${PIPESTATUS[0]}
          if [ $STATUS -ne 0 ]; then
            echo "::error::アップロード失敗"
            exit $STATUS
          fi

      - name: Save logs
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p debug
          for f in audio video upload wikimedia; do
            cp /tmp/famous_horse_${f}.log debug/last_famous_horse_${f}.log 2>/dev/null \
              || echo "(ログなし)" > debug/last_famous_horse_${f}.log
          done
          # APIキーパターンをログからマスク（key=AIzaSy... 形式）
          for f in debug/last_famous_horse_*.log; do
            sed -i 's/key=AIzaSy[A-Za-z0-9_-]*/key=***/g' "$f" 2>/dev/null || true
          done
          # サムネイル確認用（GitHubで直接プレビュー可能）
          cp output/thumbnail_0.jpg debug/last_famous_horse_thumbnail.jpg 2>/dev/null || true
          git add debug/last_famous_horse_*.log || true
          git add debug/last_famous_horse_thumbnail.jpg 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: save famous_horse logs [${{ inputs.horse_key }}] [skip ci]"
            git pull --rebase origin ${{ github.ref_name }}
            git push origin HEAD:${{ github.ref_name }}
          fi
