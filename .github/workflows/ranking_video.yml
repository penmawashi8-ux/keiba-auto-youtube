name: 歴代最強馬ランキング動画生成

on:
  workflow_dispatch:
    inputs:
      from_step:
        description: '開始ステップ (1=全部 / 3=スコアリングから / 5=台本から など)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5', '6']
      whisper_model:
        description: 'Whisperモデル (tiny=高速・低精度 / base=標準 / small=高精度・低速)'
        required: false
        default: 'tiny'
        type: choice
        options: ['tiny', 'base', 'small']
      enable_zoompan:
        description: 'ズームパンエフェクト有効化 (CI では低速なためデフォルトOFF)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-ranking-video:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    services:
      voicevox:
        image: voicevox/voicevox_engine:cpu-ubuntu20.04-latest
        ports:
          - 50021:50021

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      # ── システム依存関係 ─────────────────────────────────────────
      - name: システム依存関係インストール (ffmpeg / フォント / Chromium)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            ffmpeg \
            fonts-noto-cjk \
            libfontconfig1 \
            chromium-browser \
            chromium-chromedriver

      # ── Python 依存関係 ──────────────────────────────────────────
      - name: PyTorch (CPU版) を先にインストール
        run: |
          pip install --upgrade pip
          # CPU 専用ビルドで容量を節約 (~700MB vs GPU版 ~2GB)
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: ランキング用 Python パッケージインストール
        run: |
          pip install -r requirements-ranking.txt

      - name: 既存 requirements.txt インストール (エラーは無視)
        run: pip install -r requirements.txt || true

      # ── VOICEVOX ヘルスチェック ──────────────────────────────────
      - name: VOICEVOX 起動待機 (最大3分)
        run: |
          echo "VOICEVOXの起動を待機中..."
          for i in $(seq 1 36); do
            if curl -sf http://localhost:50021/version > /dev/null 2>&1; then
              echo "✓ VOICEVOX 起動確認: $(curl -s http://localhost:50021/version)"
              break
            fi
            if [ "$i" -eq 36 ]; then
              echo "✗ VOICEVOX 起動タイムアウト (3分経過)"
              exit 1
            fi
            echo "  待機中... ($i/36) 5秒後に再試行"
            sleep 5
          done

      # ── BGM ダウンロード ─────────────────────────────────────────
      - name: BGM ダウンロード (失敗してもスキップ)
        run: python scripts/download_bgm.py || echo "BGMダウンロードをスキップして続行します"

      # ── フォント確認 ─────────────────────────────────────────────
      - name: 日本語フォント確認
        run: |
          fc-list | grep -i noto | head -5 || echo "Notoフォントが見つかりません"
          find /usr/share/fonts -name "*CJK*" -o -name "*noto*" 2>/dev/null | head -5

      # ── メインパイプライン ────────────────────────────────────────
      - name: ランキング動画パイプライン実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          VOICEVOX_URL: http://localhost:50021
          VOICEVOX_SPEAKER: '1'
          WHISPER_MODEL: ${{ inputs.whisper_model }}
          ENABLE_ZOOMPAN: ${{ inputs.enable_zoompan && '1' || '0' }}
          BGM_PATH: assets/bgm/bgm.mp3
          # Selenium 用 ChromeDriver パス (GitHub Actions ubuntu-latest)
          CHROME_DRIVER_PATH: /usr/bin/chromedriver
        run: |
          python scripts/ranking_pipeline.py --from ${{ inputs.from_step }}

      # ── 生成ファイルの確認 ────────────────────────────────────────
      - name: 生成ファイル一覧表示
        if: always()
        run: |
          echo "=== 生成ファイル ==="
          for f in horses.csv results.csv errors.txt ranking.csv script.txt narration.mp3 subtitles.srt final_output.mp4; do
            if [ -f "$f" ]; then
              size=$(du -sh "$f" | cut -f1)
              echo "✓ $f ($size)"
            else
              echo "✗ $f (なし)"
            fi
          done
          echo ""
          echo "=== graphs/ ==="
          ls -lh graphs/ 2>/dev/null || echo "(グラフなし)"

      # ── アーティファクトアップロード ──────────────────────────────
      - name: 中間ファイルをアップロード (データ確認用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-data-${{ github.run_number }}
          path: |
            horses.csv
            results.csv
            errors.txt
            ranking.csv
            script.txt
            graphs/
          retention-days: 14
          if-no-files-found: warn

      - name: 動画ファイルをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-video-${{ github.run_number }}
          path: |
            narration.mp3
            subtitles.srt
            final_output.mp4
          retention-days: 7
          if-no-files-found: warn

      # ── エラー時のデバッグ情報 ────────────────────────────────────
      - name: エラーログをGitHub Issueに投稿
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f errors.txt ]; then
            body="## ランキング動画生成エラー (Run #${{ github.run_number }})\n\`\`\`\n$(cat errors.txt)\n\`\`\`"
            gh issue create \
              --title "ranking_video: エラー発生 (run #${{ github.run_number }})" \
              --body "$(printf '%b' "$body")" \
              --label bug || true
          fi
