name: 歴代最強馬ランキング動画生成

on:
  workflow_dispatch:
    inputs:
      from_step:
        description: '開始ステップ (1=全部 / 3=スコアリングから / 5=台本から など)'
        required: false
        default: '1'
        type: choice
        options: ['1', '2', '3', '4', '5', '6']
      enable_zoompan:
        description: 'ズームパンエフェクト有効化 (CI では低速なためデフォルトOFF)'
        required: false
        default: 'false'
        type: boolean

jobs:
  generate-ranking-video:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: システム依存関係インストール (ffmpeg / フォント)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-noto-cjk libfontconfig1

      - name: Python パッケージインストール
        run: |
          pip install --upgrade pip
          pip install -r requirements-ranking.txt

      - name: BGM ダウンロード (失敗してもスキップ)
        run: python scripts/download_bgm.py || echo "BGMダウンロードをスキップ"

      - name: ランキング動画パイプライン実行
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          EDGE_TTS_VOICE: ja-JP-KeitaNeural
          ENABLE_ZOOMPAN: ${{ inputs.enable_zoompan && '1' || '0' }}
          BGM_PATH: assets/bgm/bgm.mp3
          PYTHONUNBUFFERED: '1'
        run: |
          python scripts/ranking_pipeline.py --from ${{ inputs.from_step }}

      - name: 生成ファイル一覧表示
        if: always()
        run: |
          for f in horses.csv results.csv ranking.csv script.txt narration.mp3 final_output.mp4; do
            [ -f "$f" ] && echo "✓ $f ($(du -sh $f | cut -f1))" || echo "✗ $f (なし)"
          done
          ls -lh graphs/ 2>/dev/null || echo "(グラフなし)"

      - name: 中間ファイルをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-data-${{ github.run_number }}
          path: |
            horses.csv
            results.csv
            ranking.csv
            script.txt
            graphs/
          retention-days: 14
          if-no-files-found: warn

      - name: 動画ファイルをアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ranking-video-${{ github.run_number }}
          path: |
            narration.mp3
            final_output.mp4
          retention-days: 7
          if-no-files-found: warn
